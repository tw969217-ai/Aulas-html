<body>
  <form>
      <h1>Crie sua conta</h1>
    <h4>Uma conta unica e gratuita para todos os produtos globo</h4>
    <label for="nome">Nome completo</label><br>
    <input id="nome" type="text" placeholder="informe seu nome completo" required><br>

    <label for="email">informe seu email</label><br>
    <input id="email" type="text" placeholder="Ex: @gmail, @outlook, @yahoo, etc."required><br>

    <label for="data">Data de nacimento</label><br>
    <input id="data" type="number" placeholder="dd/mm/aaaa" required><br>
    <input type="submit" value="proximo">
  </form>
</body>
